<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Teacher Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="teacher-dashboard.html">
                    <img src="logo.svg" alt="SSPLP Logo" class="logo">
                    <span>SSPLP</span>
                </a>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="teacher-dashboard.html" class="nav-link">Home</a>
                <a href="teacher-courses.html" class="nav-link active">Courses</a>
                <a href="teacher-assignments.html" class="nav-link">Assignments</a>
                <a href="teacher-students.html" class="nav-link">Students</a>
                <a href="messaging.html" class="nav-link">Messages</a>
                <a href="teacher-analytics.html" class="nav-link">Analytics</a>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <div class="language-switcher">
                    <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
                    <button class="lang-btn" data-lang="ar" onclick="setLanguage('ar')">AR</button>
                </div>
                <a href="profile.html" class="btn-secondary"><i class="fas fa-user"></i> Profile</a>
                <button id="logoutBtn" class="btn-signin">Logout</button>
            </div>
            <button class="nav-toggle" id="navToggle"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <section class="dashboard">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>My Courses</h1>
                    <p>Manage your courses here</p>
                </div>
                <a href="course-builder.html" class="btn btn-primary"><i class="fas fa-plus"></i> New Course</a>
            </div>
            <div class="card">
                <div id="coursesList"><p>Loading courses...</p></div>
            </div>
        </div>
    </section>

    <script src="js/core/i18n.js"></script>
    <script src="js/core/api.js"></script>
    <script src="js/core/data.js"></script>
    <script src="js/core/universal.js"></script>
    <script src="js/teacher/teacher-features.js"></script>
    <script src="js/core/app.js"></script>
    <script>
        document.getElementById('navToggle')?.addEventListener('click', () => {
            document.getElementById('navMenu')?.classList.toggle('active');
        });

        async function loadMyCourses() {
            const container = document.getElementById('coursesList');
            try {
                const courses = await TeacherFeatures.getCourses();
                if (!courses.length) {
                    container.innerHTML = '<p>No courses yet. Click "New Course" to create one.</p>';
                    return;
                }
                container.innerHTML = courses.map(c => `
                    <div class="content-item" style="padding: 15px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <strong>${c.title}</strong>
                            <p style="margin: 5px 0; color: #6b7280;">${c.subject} • Grade ${c.grade} • ${(c.modules || []).length} module(s)</p>
                            <small>Created: ${c.createdAt ? new Date(c.createdAt).toLocaleDateString() : 'N/A'}</small>
                        </div>
                        <span class="badge badge-${c.status === 'approved' ? 'success' : c.status === 'rejected' ? 'danger' : 'warning'}">${c.status}</span>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = '<p>Failed to load courses.</p>';
                console.warn('Failed to load courses:', error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', loadMyCourses);
    </script>
</body>
</html>
