<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tutoring - SSPLP</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/student-features.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="student-dashboard.html">
                    <img src="logo.svg" alt="SSPLP Logo" class="logo">
                    <span>SSPLP</span>
                </a>
            </div>
            <div class="nav-menu">
                <a href="student-dashboard.html" class="nav-link">Home</a>
                <a href="subjects.html" class="nav-link">Subjects</a>
                <a href="quizzes.html" class="nav-link">Quizzes</a>
                <a href="tutoring.html" class="nav-link active">Tutoring</a>
                <a href="messaging.html" class="nav-link">Messages</a>
                <a href="progress.html" class="nav-link">Progress</a>
            </div>
            <button id="logoutBtn" class="btn-signin">Logout</button>
        </div>
    </nav>

    <section class="dashboard">
        <div class="container">
            <h1>Book a Session</h1>
            
            <div class="card">
                <h2>Choose Your Tutor and Time</h2>
                <form id="bookingForm">
                    <div class="form-group">
                        <label>Tutor</label>
                        <select id="tutorSelect" required>
                            <option value="">Select a tutor</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Session Type</label>
                        <select id="sessionType" required>
                            <option value="Individual">Individual (1-on-1)</option>
                            <option value="Group">Group Session</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Date & Time</label>
                        <input type="datetime-local" id="datetime" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Book Session</button>
                </form>
            </div>

            <div class="card">
                <h2>Your Booked Sessions</h2>
                <div id="sessionsList"></div>
            </div>
        </div>
    </section>

    <script src="js/core/universal.js"></script>
    <script src="js/core/api.js"></script>
    <script src="js/core/data.js"></script>
    <script src="js/student/student-features.js"></script>
    <script src="js/core/app.js"></script>
    <script>
        // FR05: Virtual Tutoring Booking
        async function loadTeachers() {
            const users = await Data.users.list();
            const teachers = users.filter(u => u.role === 'teacher');
            const select = document.getElementById('tutorSelect');

            select.innerHTML = '<option value="">Select a tutor</option>' + teachers.map(t => `
                <option value="${t._id}">${t.name}${t.subjects && t.subjects[0] ? ' - ' + t.subjects[0] : ''}</option>
            `).join('');
        }

        async function loadSessions() {
            const sessions = await StudentFeatures.getUpcomingSessions();
            const container = document.getElementById('sessionsList');

            container.innerHTML = sessions.length ? sessions.map(s => `
                <div class="session-item">
                    <div>
                        <strong>${s.type} Session</strong>
                        <p>${new Date(s.datetime).toLocaleString()}</p>
                        <small>Status: ${s.status}</small>
                    </div>
                    <a href="${s.meetLink}" class="btn btn-primary" target="_blank">
                        <i class="fas fa-video"></i> Join Session
                    </a>
                </div>
            `).join('') : '<p>No upcoming sessions</p>';
        }

        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const tutorId = document.getElementById('tutorSelect').value;
            const type = document.getElementById('sessionType').value;
            const datetime = document.getElementById('datetime').value;

            try {
                await StudentFeatures.bookTutoring(tutorId, new Date(datetime).toISOString(), type);
                await loadSessions();
                e.target.reset();
            } catch (error) {
                console.error('Failed to book session:', error);
                alert('Failed to book session: ' + error.message);
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            await loadTeachers();
            await loadSessions();
        });
    </script>
</body>
</html>
